<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Gallery | NextGen Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <i class="fa-solid fa-cube"></i>
            <span>NextGen Store</span>
        </a>
        <ul class="nav-links" id="navbarLinks">
            <li><a href="/" class="nav-link">Home</a></li>
            <li><a href="/products-page" class="nav-link active">Products</a></li>
            <li><a href="/login-page" class="btn-nav-action btn-nav-login">Sign In</a></li>
            <li><a href="/register-page" class="btn-nav-action btn-nav-register">Register</a></li>
        </ul>
    </nav>

    <!-- Gallery Container -->
    <div class="gallery-container has-navbar">
        <!-- Header & Search -->
        <div class="gallery-header">
            <div class="gallery-title-wrapper">
                <h1 class="gallery-title">Product Showcase</h1>
                <p class="gallery-subtitle">Explore our curated collection of premium products</p>
            </div>
            <div class="search-bar-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchBar" class="search-input" placeholder="Search products by name or description...">
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <!-- Shimmer/Loading State -->
            <div class="empty-state" style="animation: none;">
                <i class="fa-solid fa-circle-notch fa-spin empty-icon" style="color: var(--primary-color);"></i>
                <h3 class="empty-title">Loading Products</h3>
                <p class="empty-desc">Fetching catalog from the server...</p>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="/static/script.js"></script>
</body>
</html>
