<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | NextGen Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <i class="fa-solid fa-cube"></i>
            <span>NextGen Store</span>
        </a>
        <ul class="nav-links">
            <!-- Populated dynamically via script.js -->
        </ul>
    </nav>

    <!-- Orders Layout Container -->
    <div class="gallery-container has-navbar" style="max-width: 900px;">
        <div class="gallery-header" style="margin-bottom: 30px;">
            <div class="gallery-title-wrapper">
                <h1 class="gallery-title">Order History</h1>
                <p class="gallery-subtitle">Track your previous orders, transaction totals, and statuses</p>
            </div>
            <a href="/products-page" class="btn-secondary" style="padding: 10px 20px; font-size: 0.9rem; text-decoration: none;">
                <i class="fa-solid fa-store" style="margin-right: 8px;"></i> Continue Shopping
            </a>
        </div>

        <!-- Orders Accordion History -->
        <div class="orders-history-list" id="ordersHistoryList">
            <!-- Loading Shimmer/Spinner State -->
            <div class="empty-state" style="animation: none;">
                <i class="fa-solid fa-circle-notch fa-spin empty-icon" style="color: var(--primary-color);"></i>
                <h3 class="empty-title">Loading History</h3>
                <p class="empty-desc">Fetching your previous purchases...</p>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="/static/script.js"></script>
</body>
</html>
